<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permafrost Methane Eruption Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #001f3f, #0074D9);
            color: white;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            background-color: rgba(0, 0, 0, 0.4);
        }
        form {
            margin-top: 40px;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
        }
        input[type="file"] {
            padding: 10px;
            margin: 10px 0;
        }
        button {
            padding: 10px 20px;
            background-color: #2ECC40;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background-color: #27AE60;
        }
        footer {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <header>
        🌍 Prediction of Permafrost Methane Eruptions
    </header>
    <main>
        <p>Upload a satellite image to predict potential methane eruption zones using our AI-powered deep learning model.</p>
        <form action="/predict" method="POST" enctype="multipart/form-data">
            <input type="file" name="satellite_image" accept=".tif,.jpg,.png" required>
            <br>
            <button type="submit">Predict</button>
        </form>
    </main>
    <footer>
        © 2025 Permafrost Methane Emission Project – Built with Deep Spatial-Temporal Learning & Physics Insights
    </footer>
</body>
</html>
