<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Results</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #001f3f, #0074D9);
            color: white;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            background-color: rgba(0, 0, 0, 0.4);
        }
        .content {
            margin-top: 30px;
        }
        img {
            max-width: 90%;
            height: auto;
            margin: 10px;
            border-radius: 12px;
            border: 3px solid white;
        }
        .result-box {
            margin-top: 20px;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
            width: 80%;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2ECC40;
            border-radius: 8px;
            color: white;
            text-decoration: none;
        }
        a:hover {
            background-color: #27AE60;
        }
    </style>
</head>
<body>
    <header>
        🌍 Prediction Results – Permafrost Methane Eruption Risk
    </header>

    <div class="content">
        <h2>Original Uploaded Image</h2>
        <img src="{{ original_image }}" alt="Original Satellite Image">

        <h2>Predicted Methane Eruption Mask</h2>
        <img src="{{ prediction_mask }}" alt="Prediction Mask">

        <div class="result-box">
            <h3>Physics-Aware Risk Assessment</h3>
            <p>Predicted Risk Level: <strong>{{ risk_level }}</strong></p>
            <p>Methane Release Probability: <strong>{{ risk_score }}%</strong></p>
            <p>{{ extra_message }}</p>
        </div>

        <a href="/">🔙 Upload Another Image</a>
    </div>
</body>
</html>
